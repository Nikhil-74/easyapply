spring.application.name=easyapply
spring.config.import=optional:file:./application-local.properties

# User credentials — set via environment variables or application-local.properties (gitignored)

easyapply.user.email=${EASYAPPLY_USER_EMAIL}
easyapply.user.password=${EASYAPPLY_USER_PASSWORD}
easyapply.user.resume-path=${EASYAPPLY_RESUME_PATH}

# Mail
easyapply.mail.smtp.host=smtp.gmail.com
easyapply.mail.smtp.port=587

# Data files (classpath)
easyapply.data.recruiter-list=classpath:data/recruiter.txt
easyapply.data.mail-template=classpath:templates/mail-template.txt

# Selenium / LinkedIn
easyapply.selenium.profile-path=C:/linkedin-profile
easyapply.selenium.search-url=https://www.linkedin.com/search/results/content/?keywords=hiring%20java&origin=FACETED_SEARCH&datePosted=%5B%22past-24h%22%5D
easyapply.selenium.max-posts=200
easyapply.selenium.max-scroll-attempts=60
easyapply.selenium.scroll-delay-ms=3000
easyapply.selenium.page-load-wait-ms=5000
easyapply.selenium.element-wait-seconds=20

# AI (Ollama)
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.model=qwen2.5:3b
spring.ai.ollama.chat.options.temperature=0.1
spring.ai.ollama.chat.options.top-p=0.9
easyapply.ai.max-post-text-length=7000
easyapply.ai.min-experience-years=3
easyapply.ai.max-experience-years=4
