spring.application.name=easyapply
spring.threads.virtual.enabled=true
spring.config.import=optional:file:./application-local.properties

# User credentials — set via environment variables or application-local.properties (gitignored)

easyapply.user.email=${EASYAPPLY_USER_EMAIL}
easyapply.user.password=${EASYAPPLY_USER_PASSWORD}
easyapply.user.resume-path=${EASYAPPLY_RESUME_PATH}

# Mail
easyapply.mail.smtp.host=smtp.gmail.com
easyapply.mail.smtp.port=587

# Data files (classpath)
easyapply.data.recruiter-list=file:./data/recruiter.txt
easyapply.data.mail-template=file:./templates/mail-template.txt

# Selenium
easyapply.selenium.profile-path=${EASYAPPLY_SELENIUM_PROFILE_PATH}
easyapply.selenium.search-url=${EASYAPPLY_SELENIUM_SEARCH_URL}
easyapply.selenium.max-posts=${EASYAPPLY_SELENIUM_MAX_POSTS}
easyapply.selenium.max-scroll-attempts=${EASYAPPLY_SELENIUM_MAX_SCROLL_ATTEMPTS}
easyapply.selenium.scroll-delay-ms=${EASYAPPLY_SELENIUM_SCROLL_DELAY_MS}
easyapply.selenium.page-load-wait-ms=${EASYAPPLY_SELENIUM_PAGE_LOAD_WAIT_MS}
easyapply.selenium.element-wait-seconds=${EASYAPPLY_SELENIUM_ELEMENT_WAIT_SECONDS}

# Ollama
spring.ai.ollama.base-url=${OLLAMA_BASE_URL}
spring.ai.ollama.chat.model=${OLLAMA_MODEL}
spring.ai.ollama.chat.options.temperature=${OLLAMA_TEMPERATURE}
spring.ai.ollama.chat.options.top-p=${OLLAMA_TOP_P}

# AI
easyapply.ai.max-post-text-length=${EASYAPPLY_AI_MAX_POST_TEXT_LENGTH}
easyapply.ai.min-experience-years=${EASYAPPLY_AI_MIN_EXPERIENCE_YEARS}
easyapply.ai.max-experience-years=${EASYAPPLY_AI_MAX_EXPERIENCE_YEARS}
easyapply.ai.match-minimum-percentage=${EASYAPPLY_AI_MATCH_MINIMUM_PERCENTAGE}